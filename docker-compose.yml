services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  redis:
    # Live chat state only (key chat:{uuid}) — RabbitMQ remains the only
    # message broker; Redis here never carries events.
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: codeinspect
      POSTGRES_PASSWORD: codeinspect
      POSTGRES_DB: codeinspect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeinspect -d codeinspect"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      APP_ENV: "DEV"
      SERVICE_NAME: "backend"
      CORS_ORIGINS: "http://localhost:3000"
      DATABASE_URL: "postgresql://codeinspect:codeinspect@postgres:5432/codeinspect"
      DATABASE_SCHEMA: "backend"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      REDIS_URL: "redis://redis:6379"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  checkout-service:
    build:
      context: ./checkout-service
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8001:8000"
    environment:
      PORT: "8000"
      APP_ENV: "DEV"
      SERVICE_NAME: "checkout-service"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      REPOSITORIES_DIR: "/repositories"
    volumes:
      - ./checkout-service:/app
      - checkout_service_node_modules:/app/node_modules
      - checkout_service_dist:/app/dist
      - repositories:/repositories
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  parse-service:
    build:
      context: ./parse-service
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8002:8000"
    environment:
      PORT: "8000"
      APP_ENV: "DEV"
      SERVICE_NAME: "parse-service"
      DATABASE_URL: "postgresql://codeinspect:codeinspect@postgres:5432/codeinspect"
      DATABASE_SCHEMA: "parse"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    volumes:
      - ./parse-service:/app
      - parse_service_node_modules:/app/node_modules
      - parse_service_dist:/app/dist
      - repositories:/repositories
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8003:8000"
    environment:
      PORT: "8000"
      APP_ENV: "DEV"
      SERVICE_NAME: "embedding-service"
    volumes:
      - ./embedding-service:/app
      - embedding_service_node_modules:/app/node_modules
      - embedding_service_dist:/app/dist
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      # First boot downloads the ONNX model from the Hugging Face Hub; later
      # boots reuse the cache in the bind-mounted ./embedding-service/.cache.
      start_period: 90s
    restart: unless-stopped

  index-service:
    build:
      context: ./index-service
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8004:8000"
    environment:
      PORT: "8000"
      APP_ENV: "DEV"
      SERVICE_NAME: "index-service"
      DATABASE_URL: "postgresql://codeinspect:codeinspect@postgres:5432/codeinspect"
      DATABASE_SCHEMA: "index"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      EMBEDDING_SERVICE_URL: "http://embedding-service:8000"
    volumes:
      - ./index-service:/app
      - index_service_node_modules:/app/node_modules
      - index_service_dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  retrieval-service:
    build:
      context: ./retrieval-service
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8005:8000"
    env_file:
      - path: ./retrieval-service/.env
        required: false
    environment:
      PORT: "8000"
      APP_ENV: "DEV"
      SERVICE_NAME: "retrieval-service"
      DATABASE_URL: "postgresql://codeinspect:codeinspect@postgres:5432/codeinspect"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      REDIS_URL: "redis://redis:6379"
      EMBEDDING_SERVICE_URL: "http://embedding-service:8000"
    volumes:
      - ./retrieval-service:/app
      - retrieval_service_node_modules:/app/node_modules
      - retrieval_service_dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: infra/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      API_TARGET: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  backend_node_modules:
  backend_dist:
  checkout_service_node_modules:
  checkout_service_dist:
  parse_service_node_modules:
  parse_service_dist:
  embedding_service_node_modules:
  embedding_service_dist:
  index_service_node_modules:
  index_service_dist:
  retrieval_service_node_modules:
  retrieval_service_dist:
  repositories:
